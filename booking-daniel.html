<!DOCTYPE html>
<html>
<head>
<title>Book Daniel Wu - ChefHaus</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
background-image:url('https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.8);
min-height:100vh;
padding:50px 20px 80px 20px;
}

.hero img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #ff5a00;
box-shadow:0 0 20px rgba(255,90,0,0.4);
margin-bottom:20px;
}

.hero h1{
font-size:42px;
margin:10px 0;
}

.hero p{
font-size:18px;
color:#ddd;
max-width:600px;
margin:0 auto;
}

form{
background:rgba(20,20,20,0.95);
max-width:520px;
margin:30px auto 0 auto;
padding:30px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

input, textarea{
width:90%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
background:#2a2a2a;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
background:#ff5a00;
color:white;
border:none;
padding:16px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:15px;
box-shadow:0 0 15px rgba(255,90,0,0.35);
}

a{
text-decoration:none;
color:white;
}

.back{
margin-top:30px;
font-size:18px;
}
</style>
</head>
<body>

<div class="overlay">

  <div class="hero">
    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=800&q=80" alt="Daniel Wu">
    <h1>Book Daniel Wu</h1>
    <p>Asian Fusion Chef — modern flavours, creative menus, and premium presentation.</p>
  </div>

  <form action="https://formspree.io/f/xreygzbj" method="POST">
    <input type="hidden" name="chef" value="Daniel Wu">
    <input type="hidden" name="_subject" value="New ChefHaus Booking Request - Daniel Wu">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="date" name="date" required>
    <input type="number" name="guests" placeholder="Number of Guests" required>
    <textarea name="requests" placeholder="Special Requests"></textarea>

    <button type="submit">Request Booking</button>
  </form>

  <div class="back">
    <a href="daniel.html">← Back to Daniel</a>
  </div>

</div>

</body>
</html>
