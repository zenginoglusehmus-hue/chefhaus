<!DOCTYPE html>
<html>
<head>
<title>Book Daniel Wu - ChefHaus</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
background-image:url('https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.nav{
background:#000;
padding:18px 20px;
display:flex;
justify-content:center;
gap:30px;
position:sticky;
top:0;
z-index:1000;
}

.nav a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

.overlay{
background:rgba(0,0,0,0.8);
min-height:100vh;
padding:50px 20px 80px 20px;
}

.hero img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #ff5a00;
box-shadow:0 0 20px rgba(255,90,0,0.4);
margin-bottom:20px;
}

.hero h1{
font-size:42px;
margin:10px 0;
}

.hero p{
font-size:18px;
color:#ddd;
max-width:600px;
margin:0 auto;
}

.price-note{
margin-top:12px;
font-size:18px;
font-weight:bold;
color:#fff;
}

form{
background:rgba(20,20,20,0.95);
max-width:520px;
margin:30px auto 0 auto;
padding:30px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

input, textarea{
width:90%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
background:#2a2a2a;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

.total-box{
margin:18px auto 6px auto;
padding:16px;
width:90%;
background:#1a1a1a;
border:1px solid #333;
border-radius:12px;
font-size:22px;
font-weight:bold;
color:#ffb38a;
}

.small-text{
font-size:14px;
color:#bbb;
margin-top:8px;
}

button{
background:#ff5a00;
color:white;
border:none;
padding:16px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:15px;
box-shadow:0 0 15px rgba(255,90,0,0.35);
}
</style>
</head>
<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="chefs.html">Find a Chef</a>
  <a href="become-a-chef.html">Become a Chef</a>
</div>

<div class="overlay">
  <div class="hero">
    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=800&q=80" alt="Daniel Wu">
    <h1>Book Daniel Wu</h1>
    <p>Asian Fusion Chef — modern flavours, creative menus, and premium presentation.</p>
    <div class="price-note">$105 per guest</div>
  </div>

  <form action="https://formspree.io/f/xreygzbj" method="POST">
    <input type="hidden" name="chef" value="Daniel Wu">
    <input type="hidden" name="_subject" value="New ChefHaus Booking Request - Daniel Wu">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="date" name="date" required>
    <input type="number" id="guests" name="guests" placeholder="Number of Guests" min="1" required oninput="updateTotal()">
    <textarea name="requests" placeholder="Special Requests"></textarea>

    <div class="total-box">
      Estimated Total: $<span id="total">0</span>
    </div>
    <div class="small-text">Based on $105 per guest.</div>

    <button type="submit">Request Booking</button>
  </form>
</div>

<script>
function updateTotal() {
  const guests = parseInt(document.getElementById('guests').value) || 0;
  const pricePerGuest = 105;
  const total = guests * pricePerGuest;
  document.getElementById('total').textContent = total;
}
</script>

</body>
</html>
