<!DOCTYPE html>
<html>
<head>
<title>Request Sent - ChefHaus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
}
.card{
  max-width:620px;
  width:100%;
  background:linear-gradient(180deg,#17181b,#1f2024);
  border:1px solid #2b2d33;
  border-radius:24px;
  padding:40px 28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.45);
}
.icon{
  font-size:56px;
  margin-bottom:10px;
}
h1{
  margin:0 0 12px 0;
  font-size:40px;
}
p{
  color:#d0d0d5;
  font-size:18px;
  line-height:1.6;
}
.actions{
  margin-top:26px;
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}
a{
  text-decoration:none;
  font-weight:bold;
  border-radius:14px;
  padding:14px 22px;
}
.primary{
  background:linear-gradient(135deg,#ff6a00,#ff9d57);
  color:white;
}
.secondary{
  background:#2a2a2f;
  color:white;
}
</style>
</head>
<body>

<div class="card">
  <div class="icon">✅</div>
  <h1>Request Sent</h1>
  <p>Your booking or application has been submitted successfully. We’ll review it and get back to you soon.</p>

  <div class="actions">
    <a class="primary" href="chefs.html">Find a Chef</a>
    <a class="secondary" href="index.html">Back Home</a>
  </div>
</div>

</body>
</html>
