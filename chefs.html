<!DOCTYPE html>
<html>
<head>
  <title>Find a Chef - ChefHaus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, sans-serif;
      background:#0d0d0f;
      color:white;
    }

    .topbar{
      background:#0a0a0a;
      padding:18px 16px;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:16px;
    }

    .brand img{
      width:52px;
      height:52px;
      object-fit:contain;
      border-radius:12px;
    }

    .brand-name{
      font-size:34px;
      font-weight:700;
      letter-spacing:0.5px;
    }

    .nav{
      display:flex;
      justify-content:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav a{
      color:#f2f2f2;
      text-decoration:none;
      font-size:15px;
      font-weight:600;
    }

    .hero{
      padding:58px 18px 28px;
      text-align:center;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.78)),
        url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=80");
      background-size:cover;
      background-position:center;
    }

    .hero h1{
      font-size:48px;
      margin-bottom:14px;
    }

    .hero p{
      max-width:760px;
      margin:0 auto;
      color:#d7d7d7;
      font-size:18px;
      line-height:1.5;
    }

    .wrap{
      padding:28px 18px 70px;
      max-width:900px;
      margin:0 auto;
    }

    .chefs{
      display:grid;
      grid-template-columns:1fr;
      gap:24px;
    }

    .card{
      background:#151518;
      border:1px solid rgba(255,255,255,0.06);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 8px 25px rgba(0,0,0,0.35);
    }

    .card img{
      width:100%;
      height:260px;
      object-fit:cover;
      display:block;
    }

    .card-content{
      padding:24px;
      text-align:center;
    }

    .badge-row{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .badge{
      display:inline-block;
      padding:7px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      background:#232326;
      color:white;
    }

    .featured{
      background:linear-gradient(135deg,#c92a1f,#ff5a2f);
    }

    .card h2{
      font-size:38px;
      margin-bottom:12px;
    }

    .card p{
      color:#d0d0d0;
      font-size:17px;
      line-height:1.5;
      margin:6px 0;
    }

    .price{
      font-size:24px;
      font-weight:700;
      color:white;
      margin-top:14px;
    }

    .btn{
      display:block;
      width:100%;
      margin-top:20px;
      text-align:center;
      text-decoration:none;
      background:linear-gradient(135deg,#c92a1f,#ff5a2f);
      color:white;
      padding:16px 20px;
      border-radius:14px;
      font-weight:700;
      font-size:16px;
    }

    .footer{
      text-align:center;
      padding:28px 18px;
      color:#999;
      border-top:1px solid rgba(255,255,255,0.06);
      background:#0a0a0a;
      font-size:14px;
    }

    @media(min-width:768px){
      .brand{
        justify-content:flex-start;
        margin-bottom:0;
      }

      .topbar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:18px 28px;
      }

      .hero h1{
        font-size:62px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="logo.png" alt="ChefHaus Logo">
      <div class="brand-name">ChefHaus</div>
    </div>

    <div class="nav">
      <a href="index.html">Home</a>
      <a href="chefs.html">Find a Chef</a>
      <a href="become-a-chef.html">Become a Chef</a>
    </div>
  </div>

  <section class="hero">
    <h1>Find a Chef</h1>
    <p>Book our featured private chef for an unforgettable in-home dining experience.</p>
  </section>

  <div class="wrap">
    <div class="chefs">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf?auto=format&fit=crop&w=1000&q=80" alt="Marco Rossi">
        <div class="card-content">
          <div class="badge-row">
            <span class="badge featured">Featured Chef</span>
            <span class="badge">Melbourne</span>
          </div>
          <h2>Marco Rossi</h2>
          <p><strong>Specialty:</strong> Italian Fine Dining</p>
          <p><strong>Rating:</strong> ★ 4.9</p>
          <p><strong>Experience:</strong> 12 years</p>
          <div class="price">$110 per guest</div>
          <a class="btn" href="marco.html">View Marco</a>
        </div>
      </div>

    </div>
  </div>

  <div class="footer">
    ChefHaus © 2026
  </div>

</body>
</html>
