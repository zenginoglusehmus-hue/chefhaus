<!DOCTYPE html>
<html>
<head>
<title>Book a Chef - ChefHaus</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:60px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

form{
background:#1a1a1a;
max-width:500px;
margin:auto;
padding:30px;
border-radius:12px;
}

input, textarea{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
background:#ff5a00;
color:white;
border:none;
padding:14px 28px;
font-size:16px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

a{
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Book Your Chef</h1>

<form action="https://formspree.io/f/xreygzbj" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="date" name="date" required>

<input type="number" name="guests" placeholder="Number of Guests" required>

<textarea name="requests" placeholder="Special Requests"></textarea>

<input type="hidden" name="_subject" value="New ChefHaus Booking Request">

<input type="hidden" name="_captcha" value="false">

<button type="submit">Request Booking</button>

</form>

<p style="margin-top:30px;">
<a href="index.html">← Back to Home</a>
</p>

</body>
</html>
