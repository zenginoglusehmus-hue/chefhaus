<!DOCTYPE html>
<html>
<head>
<title>Book a Chef - ChefHaus</title>
<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:60px;
}

form{
background:#1a1a1a;
max-width:500px;
margin:auto;
padding:30px;
border-radius:12px;
}

input, textarea{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
background:#ff5a00;
color:white;
border:none;
padding:14px 28px;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Book Your Chef</h1>

<p id="chef-name"></p>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Email">

<input type="date">

<input type="number" placeholder="Number of Guests">

<textarea placeholder="Special requests"></textarea>

<button type="submit">Request Booking</button>

</form>

<p><a href="chefs.html">← Back to Chefs</a></p>

<script>
const params = new URLSearchParams(window.location.search);
const chef = params.get('chef');
if (chef) {
  document.getElementById('chef-name').textContent = `Chef: ${chef}`;
}
</script>

</body>
</html>
