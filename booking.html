<!DOCTYPE html>
<html>
<head>

<title>Book a Private Chef | ChefHaus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0f0f10;
color:white;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:30px;
font-size:40px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
background:#151518;
padding:25px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.06);
}

input,textarea,select{
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#232326;
color:white;
}

textarea{
min-height:100px;
}

button{
margin-top:20px;
padding:16px;
border:none;
background:#ff5a2f;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;
}

.note{
color:#ccc;
margin-top:10px;
font-size:14px;
text-align:center;
}

.back{
display:block;
text-align:center;
margin-top:25px;
color:#ccc;
text-decoration:none;
}

.total{
text-align:center;
margin-top:10px;
font-size:20px;
font-weight:bold;
}

</style>

<script>

function calculateTotal(){

let guests = document.getElementById("guests").value;

let price = 110;

let total = guests * price;

document.getElementById("total").innerHTML =
"Estimated total: $" + total;

}

</script>

</head>

<body>

<div class="container">

<h1>Book Marco Rossi</h1>

<form>

<input type="text" value="Marco Rossi" readonly>

<input placeholder="Full Name" required>

<input placeholder="Email Address" required>

<input placeholder="Phone Number">

<select id="guests" onchange="calculateTotal()">

<option value="1">1 Guest</option>
<option value="2">2 Guests</option>
<option value="3">3 Guests</option>
<option value="4">4 Guests</option>
<option value="5">5 Guests</option>
<option value="6">6 Guests</option>
<option value="7">7 Guests</option>
<option value="8">8 Guests</option>

</select>

<input type="date">

<textarea placeholder="Food preferences, allergies or special requests"></textarea>

<div class="total" id="total">
Estimated total: $110
</div>

<p class="note">
After clicking payment please adjust the <b>quantity</b> on the Stripe payment page to match the number of guests selected.
</p>

<a href="https://buy.stripe.com/bJeeVcePogQpaG12tLfYY00">
<button type="button">
Proceed to Payment
</button>
</a>

</form>

<a class="back" href="index.html">
← Back to Home
</a>

</div>

</body>
</html>
