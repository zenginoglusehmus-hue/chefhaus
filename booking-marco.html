<!DOCTYPE html>
<html>
<head>
<title>Book Marco Rossi - ChefHaus</title>
<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
background-image:url('https://images.unsplash.com/photo-1551218808-94e220e084d2');
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,0.8);
min-height:100vh;
padding:50px 20px;
}

.hero img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #ff5a00;
}

.hero h1{
font-size:42px;
margin:10px 0;
}

form{
background:#1c1c1c;
max-width:500px;
margin:30px auto;
padding:30px;
border-radius:15px;
}

input,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
background:#2a2a2a;
color:white;
}

button{
background:#ff5a00;
border:none;
padding:15px 30px;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">

<div class="hero">
<img src="https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf">
<h1>Book Marco Rossi</h1>
<p>Italian Fine Dining Chef</p>
</div>

<form action="https://formspree.io/f/xreygzbj" method="POST">
<input type="hidden" name="chef" value="Marco Rossi">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="date" name="date" required>
<input type="number" name="guests" placeholder="Number of Guests" required>

<textarea name="requests" placeholder="Special Requests"></textarea>

<button type="submit">Request Booking</button>
</form>

<a href="index.html">← Back to Home</a>

</div>

</body>
</html>
