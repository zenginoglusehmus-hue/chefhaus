<!DOCTYPE html>
<html>
<head>

<title>Book Marco Rossi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0f0f10;
color:white;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea,select{
padding:14px;
border-radius:8px;
border:none;
font-size:16px;
}

textarea{
min-height:100px;
}

button{
margin-top:20px;
padding:16px;
border:none;
background:#ff5a2f;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.total{
margin-top:10px;
font-size:20px;
font-weight:bold;
text-align:center;
}

</style>

<script>

function calculateTotal(){

let guests = document.getElementById("guests").value;

let price = 110;

let total = guests * price;

document.getElementById("total").innerHTML = 
"Estimated total: $" + total;

}

</script>

</head>

<body>

<div class="container">

<h1>Book Marco Rossi</h1>

<form>

<input placeholder="Full Name" required>

<input placeholder="Email" required>

<input placeholder="Phone Number" required>

<select id="guests" onchange="calculateTotal()">

<option value="1">1 Guest</option>
<option value="2">2 Guests</option>
<option value="3">3 Guests</option>
<option value="4">4 Guests</option>
<option value="5">5 Guests</option>
<option value="6">6 Guests</option>
<option value="7">7 Guests</option>
<option value="8">8 Guests</option>

</select>

<input type="date" required>

<textarea placeholder="Food preferences / allergies"></textarea>

<div class="total" id="total">
Estimated total: $110
</div>

<a href="https://buy.stripe.com/bJeeVcePogQpaG12tLfYY00">

<button type="button">
Pay & Confirm Booking
</button>

</a>

</form>

</div>

</body>
</html>
